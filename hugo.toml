baseURL = "https://beiq.paperresearch.site/"
languageCode = "en-us"
title = "beiQ"
theme = "PaperMod"
enableRobotsTXT = true

[params]
  description = "Personal academic website and research blog for immunology, genetics, bioinformatics, and AI-assisted research workflows."
  email = "contact@paperresearch.site"
  location = "China"

[params.profileMode]
  enabled = true
  title = "beiQ"
  subtitle = "Immunology & Genetics Researcher"
  imageUrl = "images/profile.jpg"
  imageTitle = "Profile picture"
  imageWidth = 150
  imageHeight = 150
  [[params.profileMode.buttons]]
    name = "Posts"
    url = "/posts/"
  [[params.profileMode.buttons]]
    name = "Tutorials"
    url = "/tutorials/"
  [[params.profileMode.buttons]]
    name = "Project"
    url = "/project/"
  [[params.profileMode.buttons]]
    name = "About"
    url = "/about/"

[params.homepage]
  sections = ["hero", "posts", "tags", "tutorials", "project"]

  [params.homepage.hero]
    enable = true
    layout = "hero"
    title = "About"

  [params.homepage.posts]
    enable = true
    layout = "grid"
    title = "Posts"

  [params.homepage.tags]
    enable = true
    layout = "grid"
    title = "Tags"

  [params.homepage.tutorials]
    enable = true
    layout = "cards"
    title = "Tutorials"

  [params.homepage.project]
    enable = true
    layout = "cards"
    title = "Project"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        enableInShortcodes = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [
            ["\\[", "\\]"],
            ["$$", "$$"]
          ]
          inline = [
            ["\\(", "\\)"],
            ["$", "$"]
          ]

  [markup.highlight]
    style = "friendly"
    noClasses = false
    lineNos = true
    guessSyntax = true

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 10

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 20

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 30

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 40

[[menu.main]]
  name = "Tutorials"
  url = "/tutorials/"
  weight = 50

[[menu.main]]
  name = "Project"
  url = "/project/"
  weight = 60

[[cascade]]
  layout = "single"
  [cascade._target]
    path = "/**"
    kind = "page"
