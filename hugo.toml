baseURL = "https://beiq.paperresearch.site/"
languageCode = "en-us"
title = "beiQ"
theme = "celadon"
enableRobotsTXT = true

[params]
  description = "Personal academic website and research blog for immunology, genetics, bioinformatics, and AI-assisted research workflows."
  email = "contact@paperresearch.site"
  location = "China"

[params.homepage]
  sections = ["hero", "news", "research", "writing"]

  [params.homepage.hero]
    enable = true
    layout = "hero"
    title = "About"

  [params.homepage.news]
    enable = true
    layout = "news"
    title = "News"

  [params.homepage.research]
    enable = true
    layout = "cards"
    title = "Research"

  [params.homepage.writing]
    enable = true
    layout = "grid"
    title = "Writing"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        enableInShortcodes = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [
            ["\\[", "\\]"],
            ["$$", "$$"]
          ]
          inline = [
            ["\\(", "\\)"],
            ["$", "$"]
          ]

  [markup.highlight]
    style = "friendly"
    noClasses = false
    lineNos = true
    guessSyntax = true

[[cascade]]
  layout = "single"
  [cascade._target]
    path = "/**"
    kind = "page"
